<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>前端测试</ - SQL格式化器V4</ </title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .editor-section, .result-section {
            max-width: 1200px;
            margin: 10px;
        }
        .editor-container {
            height: 400px;
        }
        .actions {
            <button className="btn btn-secondary" onClick={() => setSql('')}>清空
            </button>
            <button className="btn btn-primary" onClick={analyzeSQL} disabled={loading}>
                {loading ? '分析中...' : '格式化SQL'}
            </button>
        </div>
    );
  }

}

`;
