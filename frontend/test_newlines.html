<!DOCTYPE html>
<html>
<head>
    <title>Test Newlines</title>
</head>
<body>
    <h2>测试换行符</h2>
    <p>手动设置多行文本:</p>
    <textarea id="manual" rows="5" cols="50" style="white-space: pre;">SELECT 1
FROM t1;</textarea>
    <hr>
    <p>通过API获取:</p>
    <textarea id="api" rows="5" cols="50" style="white-space: pre;"></textarea>
    <button onclick="fetchFromAPI()">获取</button>
    <hr>
    <p>调试信息:</p>
    <pre id="debug"></pre>
    <script>
        async function fetchFromAPI() {
            const response = await fetch('http://localhost:5000/api/format', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    sql: 'SELECT 1 FROM t1',
                    options: { keyword_case: 'upper', semicolon_newline: true }
                })
            });
            const data = await response.json();
            document.getElementById('api').value = data.formatted;
            document.getElementById('debug').textContent = 
                'formatted: ' + JSON.stringify(data.formatted) + '\n' +
                'length: ' + data.formatted.length + '\n' +
                'newlines count: ' + (data.formatted.match(/\n/g) || []).length;
        }
    </script>
</body>
</html>
